<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URl Shortner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'login.css' %}">
</head>
<body>

<div class="auth-container">
    <div class="auth-form-container">
        <div class="auth-form-wrapper">
            <!-- Logo -->
            <div class="text-center">
                <span class="gradient-text">URl Shortner</span>
                <p class="text-muted">Sign in to your account</p>
            </div>

            <!-- Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'error' %}error{% else %}{{ message.tags }}{% endif %}">
                        <i class="fas fa-{% if message.tags == 'error' %}exclamation-circle{% else %}check-circle{% endif %} me-2"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <!-- Login Form -->
            <form method="post" action="{% url 'signin' %}">
                {% csrf_token %}
                
                <!-- Username -->
                <div class="mb-4">
                    <label for="loginUsername" class="form-label fw-semibold">Username *</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" name="username" class="form-control" id="loginUsername" 
                               placeholder="Enter your username" required autofocus>
                        <input type="hidden" name="next" value="{{ next }}">
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label for="loginPassword" class="form-label fw-semibold">Password *</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" id="loginPassword" 
                               placeholder="Enter your password" required>
                        <button class="btn btn-outline-secondary toggle-password" type="button" data-target="loginPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input name="rememberme" class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">Remember me</label>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-4" id="submitBtn">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>

                <!-- Register Link -->
                <div class="text-center pt-3 border-top">
                    <p class="mb-0">Don't have an account? 
                        <a href="{% url 'register' %}" class="text-decoration-none fw-bold ms-1" style="color: #667eea;">Sign up</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
   <script>
    {% if messages %}
        {% for message in messages %}
            {% if message.tags == "success" %}
                alertify.set('notifier', 'position', 'top-right');
                alertify.success('{{ message }}');
            {% elif message.tags == "error" %}
                alertify.set('notifier', 'position', 'top-right');
                alertify.error('{{ message }}');
            {% else %}
                alertify.set('notifier', 'position', 'top-right');
                alertify.message('{{ message }}');
            {% endif %}
        {% endfor %}
    {% endif %}
</script>
</body>
</html>
