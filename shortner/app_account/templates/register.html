<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BP Hotel - Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'register.css' %}">
</head>
<body>

<div class="auth-container">
    <div class="auth-form-container">
        <div class="auth-form-wrapper">
            <!-- Logo -->
            <div class="text-center mb-4">
                <span class="gradient-text">URl Shortner</span>
                <p class="text-muted">Create your account</p>
            </div>

            <!-- Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'error' %}error{% else %}{{ message.tags }}{% endif %}">
                        <i class="fas fa-{% if message.tags == 'error' %}exclamation-circle{% else %}check-circle{% endif %} me-2"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <!-- Registration Form -->
            <form method="post" action="{% url 'register' %}">
                {% csrf_token %}
                
                <!-- Full Name -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="firstName" class="form-label">First Name *</label>
                        <input type="text" class="form-control" name="f_name" id="firstName" 
                               placeholder="First name" required>
                    </div>
                    <div class="col-md-6">
                        <label for="lastName" class="form-label">Last Name *</label>
                        <input type="text" class="form-control" name="l_name" id="lastName" 
                               placeholder="Last name" required>
                    </div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label for="registerEmail" class="form-label">Email Address *</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" name="email" class="form-control" id="registerEmail" 
                               placeholder="Enter your email" required>
                    </div>
                </div>

                <!-- Username -->
                <div class="mb-3">
                    <label for="username" class="form-label">Username *</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" name="username" class="form-control" id="username" 
                               placeholder="Choose a username" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="registerPassword" class="form-label">Password *</label>
                        <div class="input-group">
                            <input type="password" name="password1" class="form-control" id="registerPassword" 
                                   placeholder="Password" required>
                            
                        </div>
                        <small class="text-muted" id="passwordStrength"></small>
                    </div>
                    <div class="col-md-6">
                        <label for="confirmPassword" class="form-label">Confirm Password *</label>
                        <div class="input-group">
                            <input type="password" name="password2" class="form-control" id="confirmPassword" 
                                   placeholder="Confirm password" required>
                           
                        </div>
                        <div id="passwordMatch" class="mt-2"></div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" id="submitBtn">
                    <i class="fas fa-user-plus me-2"></i>Create Account
                </button>

                <!-- Login Link -->
                <div class="text-center">
                    <p class="mb-0">Already have an account? 
                        <a href="{% url 'signin' %}" class="text-decoration-none fw-bold" style="color: #667eea;">Sign in</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
   <script>
    {% if messages %}
        {% for message in messages %}
            {% if message.tags == "success" %}
                alertify.set('notifier', 'position', 'top-right');
                alertify.success('{{ message }}');
            {% elif message.tags == "error" %}
                alertify.set('notifier', 'position', 'top-right');
                alertify.error('{{ message }}');
            {% else %}
                alertify.set('notifier', 'position', 'top-right');
                alertify.message('{{ message }}');
            {% endif %}
        {% endfor %}
    {% endif %}
</script>
</body>
</html>
